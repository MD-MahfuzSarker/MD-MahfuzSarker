<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predatory Skeletal Serpent</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 300vh; /* Added height for scroll physics */
            overflow-x: hidden;
            background-color: #050608;
        }

        canvas {
            position: fixed; /* Keep skeleton on screen while scrolling */
            top: 0;
            left: 0;
            display: block;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
        }
    </style>
</head>
<body>

    <canvas id="skeletonCanvas"></canvas>

    <script>
        const canvas = document.getElementById('skeletonCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouse = { x: 0, y: 0 };
        let scrollY = 0;
        let lastScrollY = 0;
        let scrollVel = 0;
        
        const segments = [];
        const numSegments = 55; 
        const segDist = 12; 
        let wave = 0;

        const colors = {
            bone: '#e8e8df',
            darkBone: '#9a9a8a',
            eye: '#ff0033', // Aggressive red
            tongue: '#85001d'
        };

        function init() {
            resize();
            mouse.x = width / 2;
            mouse.y = height / 2;

            for (let i = 0; i < numSegments; i++) {
                segments.push({
                    x: mouse.x,
                    y: mouse.y,
                    angle: 0,
                    width: i === 0 ? 28 : Math.max(4, 24 * Math.exp(-i * 0.04)),
                    ribLength: i > 1 && i < 35 ? (35 - i) * 1.1 : 0 
                });
            }
            loop();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            scrollVel = currentScroll - lastScrollY;
            lastScrollY = currentScroll;
        });

        function update() {
            wave += 0.12;
            scrollVel *= 0.92; // Friction for scroll momentum

            // Head tracking
            const head = segments[0];
            head.x += (mouse.x - head.x) * 0.15;
            head.y += (mouse.y - head.y) * 0.15;
            head.angle = Math.atan2(mouse.y - head.y, mouse.x - head.x);

            // Spine physics
            for (let i = 1; i < segments.length; i++) {
                const seg = segments[i];
                const prev = segments[i - 1];

                const dx = prev.x - seg.x;
                const dy = prev.y - seg.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);

                if (distance > segDist) {
                    const wiggle = Math.sin(wave - i * 0.25) * 0.15;
                    // Scroll inertia affects tail more than head
                    const inertia = scrollVel * (i * 0.04); 
                    
                    seg.x = prev.x - Math.cos(angle + wiggle) * segDist;
                    seg.y = (prev.y - Math.sin(angle + wiggle) * segDist) + inertia;
                    seg.angle = angle;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            for (let i = segments.length - 1; i >= 0; i--) {
                const seg = segments[i];
                ctx.save();
                ctx.translate(seg.x, seg.y);
                ctx.rotate(seg.angle);

                if (i === 0) {
                    // --- DRAW SCARY PREDATORY HEAD ---
                    
                    // Flicking Tongue
                    if (Math.sin(wave * 2) > 0.7) {
                        ctx.strokeStyle = colors.tongue;
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(25, 0);
                        const tongueWiggle = Math.sin(wave * 10) * 5;
                        ctx.bezierCurveTo(35, tongueWiggle, 40, -tongueWiggle, 45, tongueWiggle);
                        ctx.stroke();
                    }

                    ctx.fillStyle = colors.bone;
                    ctx.strokeStyle = colors.darkBone;
                    ctx.lineWidth = 2;

                    // Diamond shaped skull
                    ctx.beginPath();
                    ctx.moveTo(-10, -15); // Back left
                    ctx.lineTo(25, -8);   // Front right (snout)
                    ctx.lineTo(25, 8);    // Front left (snout)
                    ctx.lineTo(-10, 15);  // Back right
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Mandibles / Side Jaws
                    ctx.beginPath();
                    ctx.ellipse(5, -12, 12, 5, Math.PI / 6, 0, Math.PI * 2);
                    ctx.ellipse(5, 12, 12, 5, -Math.PI / 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Angry Brow / Eye Sockets
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    // Left socket
                    ctx.moveTo(8, -10);
                    ctx.lineTo(18, -4);
                    ctx.lineTo(8, -2);
                    // Right socket
                    ctx.moveTo(8, 10);
                    ctx.lineTo(18, 4);
                    ctx.lineTo(8, 2);
                    ctx.fill();

                    // Red Glowing Eyes
                    ctx.fillStyle = colors.eye;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = colors.eye;
                    ctx.beginPath();
                    ctx.arc(12, -6, 2, 0, Math.PI * 2);
                    ctx.arc(12, 6, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                } else {
                    // --- DRAW VERTEBRAE & RIBS ---
                    ctx.fillStyle = colors.bone;
                    ctx.strokeStyle = colors.darkBone;

                    // Central vertebrae bone
                    const vW = seg.width;
                    const vH = seg.width * 0.8;
                    ctx.beginPath();
                    ctx.roundRect(-vW/2, -vH/2, vW, vH, 2);
                    ctx.fill();
                    ctx.stroke();

                    // Sharp Spiny Ribs
                    if (seg.ribLength > 0) {
                        ctx.beginPath();
                        ctx.lineWidth = 1.5;
                        // Top Rib
                        ctx.moveTo(0, -vH/2);
                        ctx.quadraticCurveTo(-vW, -seg.ribLength, -vW * 1.5, -seg.ribLength/2);
                        // Bottom Rib
                        ctx.moveTo(0, vH/2);
                        ctx.quadraticCurveTo(-vW, seg.ribLength, -vW * 1.5, seg.ribLength/2);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
