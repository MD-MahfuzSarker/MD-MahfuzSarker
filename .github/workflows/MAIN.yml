# GitHub Snake Game Workflow
# Generates animated snake game consuming GitHub contributions

name: Generate Snake Game

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Generate Snake Game
        uses: Platane/snk@v3
        with:
          github_user_name: MD-MahfuzSarker
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
          build_dir: dist
          snake_color: '#1f6feb'
          github_user_contributions: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Generated Files
        run: |
          echo "Checking generated files..."
          ls -lah dist/ || echo "No dist directory found"

      - name: Commit and Push Snake Game
        uses: MD-MahfuzSarker/actions-gh-pages@v3
        with:
          commit_message: "🐍 Generate snake game animation [skip ci]"
          file_pattern: dist/
          commit_options: "--no-verify"
          skip_fetch: false
          skip_checkout: false
          create_branch: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
