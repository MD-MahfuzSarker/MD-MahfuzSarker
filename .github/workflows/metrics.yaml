name: GitHub Metrics

on:
  # Schedule updates (daily at midnight UTC)
  schedule:
    - cron: "0 0 * * *"
  # Allow manual triggering
  workflow_dispatch:
  # Trigger on pushes to the main branch
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    
    # Required permissions to allow the action to commit the SVG file
    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          # The action uses this token to fetch data AND push the final file
          token: ${{ secrets.GITHUB_TOKEN }}
          user: OfficialCodeVoyage
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: true
          
          # Configuration options
          config_octicon: true
          config_timezone: America/Chicago
          config_twemoji: true
          
          # Languages plugin configuration
          plugin_languages: true
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_indepth: true
          plugin_languages_limit: 8
          plugin_languages_other: true
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          # LeetCode plugin configuration
          plugin_leetcode: true
          plugin_leetcode_limit_recent: 2
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_sections: solved
          plugin_leetcode_user: officialcodevoyage
          
          # Output filename (will be committed to the root of your repo)
          filename: metrics.svg}}
