# GitHub Metrics Workflow Configuration
# Documentation: https://github.com/lowlighter/metrics#-documentation

name: GitHub Metrics

on:
  # Schedule updates (daily at midnight UTC)
  schedule:
    - cron: "0 0 * * *"

  # Allow manual triggering of the workflow
  workflow_dispatch:

  # Trigger the workflow on pushes to the main branch
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: production

    # Define minimal required permissions for security
    permissions:
      contents: write  # Changed from read to write for commit and push
      issues: read
      pull-requests: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for metrics calculation
          ref: main

      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: OfficialCodeVoyage
          template: classic
          base: header,activity,community,repositories,metadata
          base_indepth: true
          
          # Configuration options
          config_octicon: true
          config_timezone: America/Chicago
          config_twemoji: true
          
          # Languages plugin configuration
          plugin_languages: true
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup,programming
          plugin_languages_colors: github
          plugin_languages_indepth: true
          plugin_languages_limit: 8
          plugin_languages_other: true
          plugin_languages_recent_categories: markup,programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          # LeetCode plugin configuration
          plugin_leetcode: true
          plugin_leetcode_limit_recent: 2
          plugin_leetcode_limit_skills: 10
          plugin_leetcode_sections: solved
          plugin_leetcode_user: officialcodevoyage
          
          # Output filename
          filename: metrics.svg

      - name: Commit and Push Metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📈 Update GitHub metrics [skip ci]"
          file_pattern: metrics.svg
          commit_options: "--no-verify"
          skip_fetch: false
          skip_checkout: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
